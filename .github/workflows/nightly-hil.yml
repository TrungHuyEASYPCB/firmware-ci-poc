name: Nightly HIL Regression

on:
  schedule:
    # 19:00 UTC = 02:00 Vietnam time
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Test profile"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - release
      roles:
        description: "Comma-separated device roles, for example preview or preview,regression"
        required: true
        default: "preview"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-hil-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Generate nightly HIL matrix
    runs-on: [self-hosted, ect1250]

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      profile: ${{ steps.config.outputs.profile }}
      roles: ${{ steps.config.outputs.roles }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve nightly configuration
        id: config
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile || 'smoke' }}
          INPUT_ROLES: ${{ github.event.inputs.roles || 'preview' }}
        run: |
          echo "profile=${INPUT_PROFILE}" >> "$GITHUB_OUTPUT"
          echo "roles=${INPUT_ROLES}" >> "$GITHUB_OUTPUT"

          echo "Nightly profile: ${INPUT_PROFILE}"
          echo "Nightly roles: ${INPUT_ROLES}"

      - name: Generate matrix
        id: matrix
        run: |
          python3 scripts/generate_hil_matrix.py \
            --profile "${{ steps.config.outputs.profile }}" \
            --roles "${{ steps.config.outputs.roles }}" \
            --github-output "$GITHUB_OUTPUT" \
            --output pretty

  hil:
    name: Nightly HIL ${{ matrix.device_id }} / ${{ matrix.profile }}
    needs: prepare
    runs-on: [self-hosted, ect1250]

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve firmware version
        run: |
          VERSION="$(cat RELEASE_VERSION)"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "FIRMWARE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "EXPECTED_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Firmware version: ${VERSION}"

      - name: Show matrix item
        run: |
          echo "Device ID: ${{ matrix.device_id }}"
          echo "Role: ${{ matrix.role }}"
          echo "Profile: ${{ matrix.profile }}"
          echo "Serial: ${{ matrix.serial }}"
          echo "Board: ${{ matrix.board }}"
          echo "Family: ${{ matrix.family }}"
          echo "UART: ${{ matrix.uart_port }}"
          echo "Lock ID: ${{ matrix.lock_id }}"

      - name: Device preflight
        env:
          DEVICE_ID: ${{ matrix.device_id }}
          DEVICE_ROLE: ${{ matrix.role }}
          TEST_PROFILE: ${{ matrix.profile }}
          SERIAL: ${{ matrix.serial }}
          BOARD: ${{ matrix.board }}
          FAMILY: ${{ matrix.family }}
          UART_PORT: ${{ matrix.uart_port }}
        run: |
          python3 scripts/device_preflight.py --results-dir hil-results

      - name: Static analysis
        run: |
          ./scripts/docker_ci.sh

      - name: Build firmware
        run: |
          ./scripts/docker_build.sh

      - name: Flash and validate HIL
        env:
          DEVICE_ID: ${{ matrix.device_id }}
          DEVICE_ROLE: ${{ matrix.role }}
          TEST_PROFILE: ${{ matrix.profile }}
          SERIAL: ${{ matrix.serial }}
          BOARD: ${{ matrix.board }}
          FAMILY: ${{ matrix.family }}
          UART_PORT: ${{ matrix.uart_port }}
        run: |
          export RELEASE_VERSION="$(cat RELEASE_VERSION)"
          export EXPECTED_VERSION="$RELEASE_VERSION"
          export FIRMWARE_VERSION="$RELEASE_VERSION"

          echo "Expected version: $EXPECTED_VERSION"

          ./scripts/with_device_lock.sh bash -lc './scripts/flash.sh && ./scripts/validate.sh'

      - name: Generate nightly HIL summary report
        if: always()
        env:
          DEVICE_ID: ${{ matrix.device_id }}
          DEVICE_ROLE: ${{ matrix.role }}
          TEST_PROFILE: ${{ matrix.profile }}
          SERIAL: ${{ matrix.serial }}
          BOARD: ${{ matrix.board }}
          FAMILY: ${{ matrix.family }}
          UART_PORT: ${{ matrix.uart_port }}
        run: |
          python3 scripts/write_hil_report.py --results-dir hil-results || true

      - name: Publish nightly HIL job summary
        if: always()
        run: |
          python3 scripts/publish_hil_summary.py             --results-dir hil-results             --title "Nightly HIL ${{ matrix.device_id }} / ${{ matrix.profile }}"

      - name: Notify Nightly HIL failure
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/notify_hil_failure.py --results-dir hil-results

      - name: Upload nightly HIL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-hil-results-${{ matrix.device_id }}-${{ matrix.profile }}
          path: |
            hil-results/**
