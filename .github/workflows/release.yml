name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix, for example 0.2.1'
        required: true
        default: '0.2.1'

permissions:
  contents: write

concurrency:
  group: hil-device-preview
  cancel-in-progress: false

jobs:
  github-release:
    name: Build, HIL Validate and Publish Release
    runs-on:
      - self-hosted
      - ect1250

    env:
      DEVICE_ROLE: preview
      TEST_PROFILE: smoke
      HEX_FILE: build/merged.hex

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

          echo "VERSION=${VERSION}"
          echo "TAG_NAME=${TAG_NAME}"

      - name: Prepare scripts
        run: |
          chmod +x scripts/*.sh
          chmod +x scripts/*.py
          chmod +x scripts/drivers/*.sh 2>/dev/null || true

      - name: Docker static analysis sandbox
        run: |
          ./scripts/docker_ci.sh

      - name: Discover connected devices
        run: |
          python3 scripts/discover_devices.py

      - name: Select HIL device
        run: |
          python3 scripts/select_device.py \
            --role "$DEVICE_ROLE" \
            --github-env "$GITHUB_ENV"

      - name: Show selected device
        run: |
          echo "DEVICE_ID=$DEVICE_ID"
          echo "DEVICE_ROLE=$DEVICE_ROLE"
          echo "TEST_PROFILE=$TEST_PROFILE"
          echo "BOARD=$BOARD"
          echo "SERIAL=$SERIAL"
          echo "DEVICE_FAMILY=$DEVICE_FAMILY"
          echo "UART_PORT=$UART_PORT"

          NRFUTIL="${NRFUTIL:-nrfutil}"
          if ! command -v "$NRFUTIL" >/dev/null 2>&1; then
            NRFUTIL="$HOME/.local/bin/nrfutil"
          fi

          "$NRFUTIL" --version
          "$NRFUTIL" device list

      - name: Build Zephyr firmware in Docker NCS image
        run: |
          RELEASE_VERSION="${VERSION}" ./scripts/docker_build.sh

      - name: Flash and Pytest HIL with device lock
        run: |
          ./scripts/with_device_lock.sh bash -lc './scripts/flash.sh && ./scripts/validate.sh'

      - name: Upload HIL reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hil-reports
          path: |
            hil-results/**

      - name: Package release firmware
        run: |
          RELEASE_VERSION="${VERSION}" ./scripts/package.sh

      - name: Verify release artifacts
        run: |
          RELEASE_VERSION="${VERSION}" python3 scripts/verify_release.py --version "${VERSION}"

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-package
          path: |
            release/*.tar.gz
            release/*.hex
            release/manifest.json
            release/checksums.sha256
            release/release-notes.md
            release/package.env

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Firmware ${{ env.TAG_NAME }}
          body_path: release/release-notes.md
          files: |
            release/*.tar.gz
            release/*.hex
            release/manifest.json
            release/checksums.sha256
            release/package.env
            release/release-notes.md
