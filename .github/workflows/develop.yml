name: Develop CI

on:
push:
branches:
- develop

jobs:
build:

runs-on:
  - self-hosted
  - ect1250

container:
  image: gcc:14

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Container Information
    run: |
      echo "===== CONTAINER INFO ====="
      hostname
      whoami
      pwd
      gcc --version

  - name: Build Firmware
    run: |
      chmod +x scripts/build.sh
      ./scripts/build.sh

  - name: Package Firmware
    run: |
      chmod +x scripts/package.sh
      ./scripts/package.sh

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: firmware-dev
      path: release/*.tar.gz
