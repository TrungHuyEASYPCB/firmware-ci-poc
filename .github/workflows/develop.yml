name: Develop CI

on:
  push:
    branches:
      - develop

jobs:
  build:

    runs-on:
      - self-hosted
      - ect1250

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner Information
        run: |
          echo "===== RUNNER INFO ====="
          hostname
          whoami
          pwd
          uname -a

      - name: Build Firmware
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Package Firmware
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-dev
          path: release/*.tar.gz