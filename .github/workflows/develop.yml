name: Develop CI

on:
  push:
    branches:
      - develop

jobs:
  build:

    strategy:
      matrix:
        board:
          - nrf52840dk

    runs-on:
      - self-hosted
      - ect1250

    container:
      image: ghcr.io/trunghuyeasypcb/firmware-builder:1.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Container Information
        run: |
          echo "===== CONTAINER INFO ====="
          hostname
          whoami
          pwd
          gcc --version

      - name: Build Firmware
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Package Firmware
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh

      - name: Flash Device
        run: |
          chmod +x scripts/flash.sh
          ./scripts/flash.sh ${{ matrix.board }}

      - name: Read Package Name
        run: |
          cat release/package.env >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: release/${{ env.PACKAGE_NAME }}
          
      # - name: Device Detection
      #   run: |
      #     chmod +x scripts/device_detect.sh
      #     ./scripts/device_detect.sh
      
      # - name: Device Inventory
      #   run: |
      #     chmod +x scripts/device_inventory.sh
      #     ./scripts/device_inventory.sh

      - name: Validation
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh