name: Develop CI

on:
  push:
    branches:
      - develop

jobs:
  runner-test:
    runs-on:
      - self-hosted
      - ect1250

    steps:
      - uses: actions/checkout@v4

      - name: Runner Information
        run: |
          echo "===== RUNNER INFO ====="
          hostname
          whoami
          pwd
          uname -a

      - name: Show Labels
        run: |
          echo "Runner connected successfully"